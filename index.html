<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360° Pro - GitHub Dashboard</title>
    <style>
        :root { 
            --primary: #00e676; 
            --secondary: #00b0ff; 
            --bg: #0a0a0a; 
            --card-bg: #151515;
        }
        
        body {
            margin: 0; padding: 0; background: var(--bg);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        #top-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: #222; z-index: 1000;
        }
        #progress-bar {
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.2s ease;
        }

        .container { 
            width: 95%; max-width: 1000px; 
            margin-top: 5vh;
            display: flex; flex-direction: column; align-items: center;
        }

        #viewer {
            width: 100%; aspect-ratio: 16 / 9;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border-radius: 15px; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            cursor: grab; overflow: hidden; position: relative;
            touch-action: none;
        }
        #viewer:active { cursor: grabbing; }
        #product-image { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; pointer-events: none;
            user-select: none;
        }

        .dashboard {
            margin-top: 30px; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px; width: 100%;
            transition: opacity 0.5s ease;
        }
        
        .stat-card {
            background: var(--card-bg); padding: 15px; border-radius: 12px;
            border-bottom: 2px solid #222;
        }
        
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }

        #status-bubble {
            grid-column: 1 / -1; text-align: center; color: var(--primary);
            font-size: 1rem; font-weight: 500; margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .fade-out { opacity: 0; visibility: hidden; }
    </style>
</head>
<body>

    <div id="top-loader"><div id="progress-bar"></div></div>

    <div class="container">
        <div id="viewer">
            <img id="product-image" src="" alt="Yuklanmoqda...">
        </div>

        <div class="dashboard" id="dashboard">
            <div id="status-bubble">Tizim ishga tushmoqda...</div>
            <div class="stat-card"><div class="stat-label">Progress</div><div class="stat-value"><span id="percent">0</span>%</div></div>
            <div class="stat-card"><div class="stat-label">Qolgan vaqt</div><div id="time-left" class="stat-value">-- sek.</div></div>
            <div class="stat-card"><div class="stat-label">Hajm</div><div id="data-size" class="stat-value">0.0 MB</div></div>
            <div class="stat-card"><div class="stat-label">Tezlik</div><div id="speed" class="stat-value">0.0 MB/s</div></div>
        </div>
    </div>

    <script>
        // --- ASOSIY SOZLAMALAR ---
        const totalFrames = 96;       // Jami rasmlar soni
        const fileExtension = "jpg";  // Rasmlar formati
        const avgFrameSize = 0.45;    // Taxminiy hajm (MB da) hisoblash uchun
        
        let loadedCount = 0;
        let images = [];
        let startTime = Date.now();

        const imgEl = document.getElementById('product-image');
        const pBar = document.getElementById('progress-bar');
        const pText = document.getElementById('percent');
        const tText = document.getElementById('time-left');
        const sText = document.getElementById('speed');
        const dText = document.getElementById('data-size');
        const statusBubble = document.getElementById('status-bubble');
        const viewer = document.getElementById('viewer');

        function init() {
            for (let i = 1; i <= totalFrames; i++) {
                const img = new Image();
                
                // Rasmlar nomini generatsiya qilish (1.jpg, 2.jpg...)
                // Agar rasmlar 01.jpg bo'lsa: i.toString().padStart(2, '0') + "." + fileExtension
                const fileName = `${i}.${fileExtension}`; 
                
                img.src = fileName; 
                
                img.onload = () => updateProgress(i - 1, img.src);
                img.onerror = () => {
                    console.error("Rasm topilmadi:", fileName);
                    updateProgress(i - 1, null);
                };
            }
        }

        function updateProgress(index, src) {
            loadedCount++;
            images[index] = src;
            
            const progress = (loadedCount / totalFrames) * 100;
            const now = Date.now();
            const elapsed = (now - startTime) / 1000;
            
            pBar.style.width = progress + "%";
            pText.innerText = Math.round(progress);
            
            const totalDataMB = (loadedCount * avgFrameSize).toFixed(1);
            dText.innerText = totalDataMB + " MB";
            
            if (elapsed > 0.1) {
                const currentSpeed = (totalDataMB / elapsed).toFixed(2);
                sText.innerText = currentSpeed + " MB/s";
                const speedInFramesPerSec = loadedCount / elapsed;
                const timeLeft = Math.ceil((totalFrames - loadedCount) / speedInFramesPerSec);
                tText.innerText = timeLeft > 0 ? timeLeft + " sek." : "0 sek.";
            }

            if (progress < 40) statusBubble.innerText = "Kadrlar yuklanmoqda...";
            else if (progress < 90) statusBubble.innerText = "3D model yig'ilmoqda...";
            else statusBubble.innerText = "Deyarli tayyor...";

            // Birinchi yuklangan rasmni darrov ko'rsatish
            if (loadedCount === 1 && src) imgEl.src = src;
            
            if (loadedCount === totalFrames) finishLoading();
        }

        function finishLoading() {
            statusBubble.innerText = "Tayyor! Suring yoki aylantiring.";
            statusBubble.style.color = "#00b0ff";
            setTimeout(() => {
                document.getElementById('top-loader').classList.add('fade-out');
            }, 1000);
        }

        // --- INTERAKTIV BOSHQARUV ---
        let isDragging = false;
        let startX = 0;
        let currentFrameIdx = 0;

        const handleStart = (e) => {
            isDragging = true;
            startX = (e.pageX || e.touches[0].pageX);
            viewer.style.cursor = "grabbing";
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            const x = (e.pageX || (e.touches ? e.touches[0].pageX : 0));
            const diff = x - startX;
            
            // Sezgirlik: har 10 piksel surilganda 1 kadr almashadi
            const sensitivity = 10;
            const frameOffset = Math.floor(diff / sensitivity);
            
            let displayIdx = (currentFrameIdx - frameOffset) % totalFrames;
            if (displayIdx < 0) displayIdx += totalFrames;
            
            if (images[displayIdx]) {
                imgEl.src = images[displayIdx];
            }
        };

        const handleEnd = (e) => {
            if (!isDragging) return;
            
            const x = (e.pageX || (e.changedTouches ? e.changedTouches[0].pageX : startX));
            const diff = x - startX;
            
            // Oxirgi kadrni saqlab qolish
            currentFrameIdx = (currentFrameIdx - Math.floor(diff / 10)) % totalFrames;
            if (currentFrameIdx < 0) currentFrameIdx += totalFrames;

            isDragging = false;
            viewer.style.cursor = "grab";
        };

        // Eventlarni bog'lash
        viewer.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        viewer.addEventListener('touchstart', handleStart, {passive: false});
        viewer.addEventListener('touchmove', (e) => { 
            if(isDragging) e.preventDefault(); 
            handleMove(e); 
        }, {passive: false});
        viewer.addEventListener('touchend', handleEnd);

        // Ishga tushirish
        init();
    </script>
</body>
</html>
