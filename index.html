<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360° Pro Dashboard - Realtime Sync</title>
    <style>
        :root { 
            --primary: #00e676; --secondary: #00b0ff; 
            --bg: #0a0a0a; --card-bg: #151515; --accent: #ff3d00;
        }
        
        body {
            margin: 0; padding: 0; background: var(--bg);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden; touch-action: none;
        }

        /* Yuqori progress bar */
        #top-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: #222; z-index: 1000;
        }
        #progress-bar {
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container { width: 95%; max-width: 1000px; margin-top: 5vh; }

        #viewer {
            position: relative; width: 100%; aspect-ratio: 16 / 9;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border-radius: 15px; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            cursor: grab; overflow: hidden; transition: transform 0.3s;
        }
        #viewer:active { cursor: grabbing; transform: scale(1.01); }
        
        #product-image { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; pointer-events: none;
            user-select: none; transition: opacity 0.2s;
        }

        /* 4 ta asosiy ko'rsatkich (Dashboard) */
        .dashboard {
            margin-top: 25px; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; width: 100%;
        }
        
        .stat-card {
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            border: 1px solid #222; text-align: center;
            position: relative; overflow: hidden;
            animation: slideUp 0.5s ease backwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } }

        .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1.5px; }
        .stat-value { font-size: 1.3rem; font-weight: 900; margin-top: 8px; font-family: 'Courier New', monospace; }
        .unit { font-size: 0.8rem; color: var(--secondary); margin-left: 4px; }

        /* Bildirishnoma (Notification) */
        #notif-system {
            position: fixed; bottom: 20px; right: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            background: #111; color: #fff; padding: 12px 25px; border-left: 4px solid var(--primary);
            border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: toastIn 0.3s ease-out;
        }
        @keyframes toastIn { from { transform: translateX(100%); } }

        .pulse { animation: glow 2s infinite; }
        @keyframes glow { 0%, 100% { color: var(--primary); } 50% { color: #fff; } }

    </style>
</head>
<body>

    <div id="top-loader"><div id="progress-bar"></div></div>

    <div class="container">
        <div id="viewer">
            <img id="product-image" src="" alt="360 System Rendering...">
        </div>

        <div class="dashboard">
            <div class="stat-card" style="animation-delay: 0.1s">
                <div class="stat-label">Tezlik (Real-time)</div>
                <div id="speed" class="stat-value">0.00<span class="unit">MB/s</span></div>
            </div>
            <div class="stat-card" style="animation-delay: 0.2s">
                <div class="stat-label">Ma'lumot hajmi</div>
                <div id="data-flow" class="stat-value">0.0 <span style="color:#555">/</span> 0.0<span class="unit">MB</span></div>
            </div>
            <div class="stat-card" style="animation-delay: 0.3s">
                <div class="stat-label">Progress</div>
                <div id="percent" class="stat-value pulse">0%</div>
            </div>
            <div class="stat-card" style="animation-delay: 0.4s">
                <div class="stat-label">Kadrlar (Frames)</div>
                <div id="frames" class="stat-value">0 <span style="color:#555">/</span> 96</div>
            </div>
        </div>
    </div>

    <div id="notif-system"></div>

    <script>
        const totalFrames = 96; 
        const avgFrameSize = 0.52; // MB (Sizning rasmlaringiz o'rtacha hajmi)
        const totalDataExpected = (totalFrames * avgFrameSize).toFixed(1);
        
        let loadedCount = 0;
        let images = [];
        let startTime = Date.now();

        // Elementlar
        const imgEl = document.getElementById('product-image');
        const pBar = document.getElementById('progress-bar');
        const pText = document.getElementById('percent');
        const sText = document.getElementById('speed');
        const dText = document.getElementById('data-flow');
        const fText = document.getElementById('frames');
        const notifSystem = document.getElementById('notif-system');

        function addNotification(msg, color = '#00e676') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderColor = color;
            toast.innerText = msg;
            notifSystem.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function init() {
            addNotification("Tizim ishga tushdi", "#00b0ff");
            for (let i = 1; i <= totalFrames; i++) {
                const img = new Image();
                img.src = `${i}.jpg`; 
                img.onload = () => updateProgress(i - 1, img.src);
                img.onerror = () => updateProgress(i - 1, null);
            }
        }

        function updateProgress(index, src) {
            loadedCount++;
            images[index] = src;
            
            const progress = (loadedCount / totalFrames) * 100;
            const now = Date.now();
            const elapsedSeconds = (now - startTime) / 1000;
            
            // 1. Mbps / Speed
            const loadedMB = (loadedCount * avgFrameSize);
            const speed = (loadedMB / elapsedSeconds).toFixed(2);
            sText.innerHTML = `${speed}<span class="unit">MB/s</span>`;

            // 2. Data MB / MB
            dText.innerHTML = `${loadedMB.toFixed(1)} <span style="color:#555">/</span> ${totalDataExpected}<span class="unit">MB</span>`;

            // 3. Percent
            pText.innerText = Math.round(progress) + "%";
            pBar.style.width = progress + "%";

            // 4. Frames count
            fText.innerHTML = `${loadedCount} <span style="color:#555">/</span> ${totalFrames}`;

            if (loadedCount === 1) addNotification("Birinchi kadr qabul qilindi");
            if (loadedCount === Math.floor(totalFrames/2)) addNotification("50% yuklab bo'lindi", "#ffab00");
            
            if (loadedCount === totalFrames) {
                imgEl.src = images[0];
                addNotification("Muvaffaqiyatli yakunlandi!", "#00e676");
                pText.classList.remove('pulse');
                pText.style.color = "#00e676";
            }
        }

        // Aylantirish logikasi (Silliq va aniq)
        let isDragging = false;
        let startX = 0;
        let currentIdx = 0;

        const startDragging = (e) => {
            isDragging = true;
            startX = (e.pageX || e.touches[0].pageX);
        };

        const moveDragging = (e) => {
            if (!isDragging) return;
            const x = (e.pageX || e.touches[0].pageX);
            const diff = x - startX;
            const sensitivity = 15; 
            const offset = Math.floor(diff / sensitivity);
            
            let displayIdx = (currentIdx - offset) % totalFrames;
            if (displayIdx < 0) displayIdx += totalFrames;
            
            if (images[displayIdx]) imgEl.src = images[displayIdx];
        };

        const stopDragging = (e) => {
            if (!isDragging) return;
            const x = (e.pageX || e.changedTouches[0].pageX);
            const diff = x - startX;
            currentIdx = (currentIdx - Math.floor(diff / 15)) % totalFrames;
            if (currentIdx < 0) currentIdx += totalFrames;
            isDragging = false;
        };

        viewer.addEventListener('mousedown', startDragging);
        window.addEventListener('mousemove', moveDragging);
        window.addEventListener('mouseup', stopDragging);
        viewer.addEventListener('touchstart', startDragging);
        window.addEventListener('touchmove', (e) => { e.preventDefault(); moveDragging(e); }, {passive: false});
        window.addEventListener('touchend', stopDragging);

        init();
    </script>
</body>
</html>
