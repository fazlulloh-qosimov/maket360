<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360° Real-Time Load</title>
    <style>
        :root { 
            --primary: #00ff88; --secondary: #00d4ff; 
            --bg: #050505; --card-bg: #111; --danger: #ff3d00;
        }
        
        body {
            margin: 0; padding: 0; background: var(--bg);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden; touch-action: none;
        }

        #top-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 5px;
            background: #1a1a1a; z-index: 1000;
        }
        #progress-bar {
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.3s ease;
        }

        .container { width: 95%; max-width: 1000px; margin-top: 5vh; }

        #viewer {
            position: relative; width: 100%; aspect-ratio: 16 / 9;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border-radius: 15px; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            cursor: grab; overflow: hidden;
        }

        #product-image { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; pointer-events: none;
            user-select: none;
        }

        .dashboard {
            margin-top: 20px; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px; width: 100%;
        }
        
        .stat-card {
            background: var(--card-bg); padding: 15px; border-radius: 10px;
            border: 1px solid #222; text-align: center;
        }

        .stat-label { font-size: 0.7rem; color: #777; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; font-family: monospace; }

        #status-msg {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            font-weight: bold; font-size: 0.9rem; z-index: 10;
        }

        .alert-active { color: var(--danger); animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body>

    <div id="top-loader"><div id="progress-bar"></div></div>

    <div class="container">
        <div id="viewer">
            <div id="status-msg">Tizim tayyorlanmoqda...</div>
            <img id="product-image" src="" alt="">
        </div>

        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-label">Tezlik</div>
                <div id="speed" class="stat-value">0.00 MB/s</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Hajm</div>
                <div id="data-mb" class="stat-value">0 / 220 MB</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Progress</div>
                <div id="percent" class="stat-value">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Kadrlar</div>
                <div id="frames" class="stat-value">0 / 96</div>
            </div>
        </div>
    </div>

    <script>
        const totalFrames = 96;
        const avgSize = 2.25; // 2.0 - 2.5 MB o'rtacha
        let images = new Array(totalFrames).fill(null);
        let loadedCount = 0;
        let startTime = Date.now();
        let currentMB = 0;
        let speed = 0;

        const imgEl = document.getElementById('product-image');
        const statusMsg = document.getElementById('status-msg');
        const pBar = document.getElementById('progress-bar');

        function updateStatus() {
            if (!navigator.onLine || (loadedCount > 0 && speed === 0)) {
                statusMsg.innerHTML = "<span class='alert-active'>INTERNETGA ULANING!</span>";
            } else if (loadedCount < totalFrames) {
                statusMsg.innerHTML = "<span style='color: var(--secondary)'>KUTIB TURING, YUKLANMOQDA...</span>";
            } else {
                statusMsg.innerHTML = "<span style='color: var(--primary)'>TAYYOR! SURISHINGIZ MUMKIN</span>";
            }
        }

        function init() {
            for (let i = 1; i <= totalFrames; i++) {
                const img = new Image();
                img.src = `${i}.jpg`;
                img.onload = () => {
                    images[i-1] = img.src;
                    loadedCount++;
                    currentMB += (Math.random() * (2.5 - 2.0) + 2.0); // Realistik MB o'sishi
                    
                    // Birinchi rasm yuklanishi bilan ko'rsatish
                    if (!imgEl.src && images[i-1]) imgEl.src = images[i-1];
                    
                    calculateStats();
                };
            }
            setInterval(updateStatus, 1000); // Har soniyada internetni tekshirish
        }

        function calculateStats() {
            const elapsed = (Date.now() - startTime) / 1000;
            speed = (currentMB / elapsed).toFixed(2);
            
            document.getElementById('speed').innerText = speed + " MB/s";
            document.getElementById('data-mb').innerText = Math.round(currentMB) + " / 220 MB";
            document.getElementById('frames').innerText = loadedCount + " / 96";
            
            const progress = (loadedCount / totalFrames) * 100;
            document.getElementById('percent').innerText = Math.round(progress) + "%";
            pBar.style.width = progress + "%";
        }

        // --- INTERAKTIV BOSHQARUV ---
        let isDragging = false;
        let startX = 0;
        let currentIdx = 0;

        const handleStart = (e) => {
            if (loadedCount === 0) {
                alert("Hali birorta ham rasm yuklanmadi! Iltimos kuting.");
                return;
            }
            isDragging = true;
            startX = (e.pageX || e.touches[0].pageX);
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            const x = (e.pageX || (e.touches ? e.touches[0].pageX : 0));
            const diff = x - startX;
            const sensitivity = 15;
            const offset = Math.floor(diff / sensitivity);
            
            let displayIdx = (currentIdx - offset) % totalFrames;
            if (displayIdx < 0) displayIdx += totalFrames;

            // Faqat yuklangan rasmlar ichida qidirish
            if (images[displayIdx]) {
                imgEl.src = images[displayIdx];
            } else {
                // Agar yuklanmagan kadrga kelsa, eng yaqin yuklanganini qidiradi
                let nearest = images.findIndex(img => img !== null);
                if (nearest !== -1) imgEl.src = images[nearest];
            }
        };

        const handleEnd = () => { isDragging = false; };

        const viewer = document.getElementById('viewer');
        viewer.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        viewer.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', (e) => { if(isDragging) e.preventDefault(); handleMove(e); }, {passive: false});
        window.addEventListener('touchend', handleEnd);

        init();
    </script>
</body>
</html>
