<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Pro - Dashboard</title>
    <style>
        :root { --primary: #00e676; --secondary: #00b0ff; --bg: #0a0a0a; }
        body {
            margin: 0; padding: 0; background: var(--bg);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; touch-action: none;
        }

        /* Yuqori progress chizig'i */
        #top-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            background: #1a1a1a; z-index: 1000;
        }
        #progress-bar {
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 15px var(--secondary); transition: width 0.3s linear;
        }

        .container { width: 100%; max-width: 1000px; position: relative; padding: 20px; }

        /* Asosiy ko'rinish */
        #viewer {
            width: 100%; aspect-ratio: 16 / 9;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: grab; border: 1px solid #222; position: relative;
        }
        #product-image { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Dashboard (Pastki panel) */
        .dashboard {
            margin-top: 25px; display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; width: 100%; max-width: 600px;
        }
        .stat-card {
            background: #151515; padding: 12px; border-radius: 8px;
            border-left: 3px solid var(--secondary);
        }
        .stat-label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.1rem; font-weight: bold; margin-top: 4px; color: #eee; }

        #status-bubble {
            grid-column: span 2; text-align: center; color: var(--primary);
            font-size: 0.9rem; padding: 5px; animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .hidden { opacity: 0; transform: translateY(20px); transition: 0.8s ease; pointer-events: none; }
    </style>
</head>
<body>

    <div id="top-loader">
        <div id="progress-bar"></div>
    </div>

    <div class="container" id="main-ui">
        <div id="viewer">
            <img id="product-image" src="" alt="Tayyorlanmoqda...">
        </div>

        <div class="dashboard" id="dashboard">
            <div id="status-bubble">Tizimga ulanilmoqda...</div>
            
            <div class="stat-card">
                <div class="stat-label">Progress</div>
                <div class="stat-value"><span id="percent">0</span>% (<span id="count">0/96</span>)</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Vaqt</div>
                <div id="time-left" class="stat-value">-- sek.</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Ma'lumot</div>
                <div id="data-size" class="stat-value">0.0 MB</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Tezlik</div>
                <div id="speed" class="stat-value">0.0 MB/s</div>
            </div>
        </div>
    </div>

    <script>
        const totalFrames = 96;
        const avgFrameSize = 0.45; // Taxminan bitta rasm 450 KB deb olindi
        
        let loadedCount = 0;
        let validImages = new Array(totalFrames);
        let startTime = Date.now();

        const imgEl = document.getElementById('product-image');
        const pBar = document.getElementById('progress-bar');
        const pText = document.getElementById('percent');
        const cText = document.getElementById('count');
        const tText = document.getElementById('time-left');
        const sText = document.getElementById('speed');
        const dText = document.getElementById('data-size');
        const statusBubble = document.getElementById('status-bubble');

        function init() {
            for (let i = 1; i <= totalFrames; i++) {
                const img = new Image();
                img.src = i + ".jpg";
                img.onload = () => update(i - 1, img.src);
                img.onerror = () => update(i - 1, null);
            }
        }

        function update(index, src) {
            loadedCount++;
            validImages[index] = src;
            
            const progress = (loadedCount / totalFrames) * 100;
            const now = Date.now();
            const elapsed = (now - startTime) / 1000;
            
            // 1. Progress va Dashboard yangilash
            pBar.style.width = progress + "%";
            pText.innerText = Math.round(progress);
            cText.innerText = `${loadedCount}/${totalFrames}`;
            
            // 2. Hajm va Tezlik hisobi
            const currentData = (loadedCount * avgFrameSize).toFixed(1);
            const currentSpeed = (currentData / elapsed).toFixed(1);
            dText.innerText = currentData + " MB";
            sText.innerText = (elapsed > 0.5) ? currentSpeed + " MB/s" : "Hisob...";

            // 3. Qolgan vaqt
            const remaining = Math.round((totalFrames - loadedCount) / (loadedCount / elapsed));
            tText.innerText = (loadedCount > 5) ? remaining + " sek." : "--";

            // 4. Dinamik status
            if (progress < 30) statusBubble.innerText = "Kadrlar yuklanmoqda...";
            else if (progress < 70) statusBubble.innerText = "Grafika yig'ilmoqda...";
            else if (progress < 100) statusBubble.innerText = "Tayyorlanmoqda...";

            // Birinchi rasm chiqishi
            if (loadedCount === 1 && src) imgEl.src = src;

            if (loadedCount === totalFrames) {
                statusBubble.innerText = "Tayyor! Aylantirishingiz mumkin.";
                setTimeout(() => {
                    document.getElementById('dashboard').classList.add('hidden');
                    document.getElementById('top-loader').classList.add('hidden');
                }, 3000);
            }
        }

        // SWIPE LOGIKASI
        let isDragging = false, startX = 0, currentIdx = 0;
        const viewer = document.getElementById('viewer');

        const start = (e) => { isDragging = true; startX = e.pageX || e.touches[0].pageX; };
        const move = (e) => {
            if (!isDragging) return;
            const x = e.pageX || e.touches[0].pageX;
            const diff = x - startX;
            let newIdx = Math.floor(currentIdx - diff / 15) % totalFrames;
            if (newIdx < 0) newIdx += totalFrames;
            if (validImages[newIdx]) imgEl.src = validImages[newIdx];
        };
        const end = () => { isDragging = false; };

        viewer.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        viewer.addEventListener('touchstart', start);
        window.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); }, {passive: false});
        window.addEventListener('touchend', end);

        init();
    </script>
</body>
</html>
